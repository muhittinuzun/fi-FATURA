<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiş Fatura - Akıllı Müşteri Paneli</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.263.1/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const GATEWAY_URL = "https://n8n.ittyazilim.com/webhook/fismatik-gateway";

        const apiCall = async (action, payload = {}) => {
            const session_key = localStorage.getItem('fismatik_session_key') || "";
            const response = await fetch(GATEWAY_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, payload, session_key })
            });
            return await response.json();
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [company, setCompany] = useState(null);
            const [receipts, setReceipts] = useState([]);
            const [view, setView] = useState('dashboard');
            const [loading, setLoading] = useState(true);
            const [loginForm, setLoginForm] = useState({ email: '', password: '' });

            useEffect(() => {
                const checkAuth = async () => {
                    const key = localStorage.getItem('fismatik_session_key');
                    if (key) await loadData();
                    else setLoading(false);
                };
                checkAuth();
            }, []);

            const loadData = async () => {
                setLoading(true);
                try {
                    const data = await apiCall('get_reports', { view: 'bootstrap' });
                    if (data.ok) {
                        setCompany(data.company);
                        setUser(data.profile);
                        const res = await apiCall('get_receipts');
                        setReceipts(res.receipts || []);
                    } else {
                        localStorage.removeItem('fismatik_session_key');
                    }
                } catch (e) { console.error(e); }
                finally { setLoading(false); }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                const res = await apiCall('login', loginForm);
                if (res.session_key) {
                    localStorage.setItem('fismatik_session_key', res.session_key);
                    await loadData();
                } else {
                    alert("Giriş başarısız: " + (res.message || "Bilinmeyen hata"));
                    setLoading(false);
                }
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center">Yükleniyor...</div>;

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <form onSubmit={handleLogin} className="max-w-md w-full bg-white p-8 rounded-2xl shadow-lg border space-y-4">
                        <h1 className="text-2xl font-bold text-blue-600 text-center">Fiş Fatura Giriş</h1>
                        <input type="email" placeholder="E-posta" className="w-full p-3 border rounded-lg" value={loginForm.email} onChange={e => setLoginForm({...loginForm, email: e.target.value})} required />
                        <input type="password" placeholder="Şifre" className="w-full p-3 border rounded-lg" value={loginForm.password} onChange={e => setLoginForm({...loginForm, password: e.target.value})} required />
                        <button className="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">Giriş Yap</button>
                    </form>
                </div>
            );

            return (
                <div className="min-h-screen flex">
                    <aside className="w-64 bg-slate-900 text-white p-6 space-y-6">
                        <div className="text-xl font-bold border-b border-slate-700 pb-4">Fiş Fatura</div>
                        <nav className="space-y-2">
                            <button onClick={() => setView('dashboard')} className={`w-full text-left p-3 rounded-lg ${view === 'dashboard' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}>Genel Bakış</button>
                            <button onClick={() => setView('receipts')} className={`w-full text-left p-3 rounded-lg ${view === 'receipts' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}>Fişlerim</button>
                        </nav>
                        <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="text-red-400 text-sm mt-10">Çıkış Yap</button>
                    </aside>
                    <main className="flex-1 p-10 space-y-8">
                        <header className="flex justify-between items-center">
                            <div>
                                <h2 className="text-3xl font-bold text-slate-800">{company?.name || 'Hoş Geldiniz'}</h2>
                                <p className="text-slate-500">Kullanım: {company?.used || 0} / {company?.limit || 100}</p>
                            </div>
                        </header>

                        {view === 'dashboard' ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="bg-white p-8 rounded-2xl border shadow-sm">
                                    <h3 className="text-slate-400 text-sm font-semibold uppercase">Toplam Kayıtlı Fiş</h3>
                                    <p className="text-5xl font-bold text-slate-900 mt-2">{receipts.length}</p>
                                </div>
                                <div className="bg-white p-8 rounded-2xl border shadow-sm">
                                    <h3 className="font-bold text-slate-800 mb-4">Son 5 Hareket</h3>
                                    <div className="space-y-3">
                                        {receipts.slice(0, 5).map(r => (
                                            <div key={r.id} className="flex justify-between border-b pb-2 text-sm">
                                                <span>{r.isletme_adi}</span>
                                                <span className="font-bold">{r.toplam_tutar} ₺</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="bg-white rounded-2xl border shadow-sm overflow-hidden">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50 border-b">
                                        <tr><th className="p-4">Tarih</th><th className="p-4">İşletme</th><th className="p-4 text-right">Tutar</th><th className="p-4">Durum</th></tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        {receipts.map(r => (
                                            <tr key={r.id} className="hover:bg-blue-50/30">
                                                <td className="p-4">{new Date(r.tarih).toLocaleDateString('tr-TR')}</td>
                                                <td className="p-4 font-medium">{r.isletme_adi}</td>
                                                <td className="p-4 text-right font-bold">{r.toplam_tutar} ₺</td>
                                                <td className="p-4"><span className="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-semibold">{r.durum}</span></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
