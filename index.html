<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fismatik SaaS Panel</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://unpkg.com/lucide@0.263.1/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "sans-serif"] },
          colors: {
            brand: "#2563eb",
            dark: "#0f172a",
            accent: "#7c3aed"
          }
        }
      }
    };
  </script>

  <style>
    body { background: #f8fafc; }
    .lucide { display: inline-block; vertical-align: middle; }
  </style>
</head>

<body class="font-sans text-slate-800">
  <div id="root"></div>

  <!-- Zero-build: config + api -->
  <script type="text/babel" src="./src/config.js"></script>
  <script type="text/babel" src="./src/utils/format.js"></script>
  <script type="text/babel" src="./src/api.js"></script>

  <!-- Zero-build: components -->
  <script type="text/babel" src="./src/components/Icon.js"></script>
  <script type="text/babel" src="./src/components/Header.js"></script>
  <script type="text/babel" src="./src/components/Sidebar.js"></script>
  <script type="text/babel" src="./src/components/ProgressBar.js"></script>
  <script type="text/babel" src="./src/components/SupportBanner.js"></script>
  <script type="text/babel" src="./src/components/ReceiptTable.js"></script>
  <script type="text/babel" src="./src/components/BillingSection.js"></script>

  <!-- Zero-build: pages -->
  <script type="text/babel" src="./src/pages/CustomerDashboard.js"></script>
  <script type="text/babel" src="./src/pages/ReportsPage.js"></script>
  <script type="text/babel" src="./src/pages/ReportsPageV2.js"></script>
  <script type="text/babel" src="./src/pages/SubscriptionPage.js"></script>
  <script type="text/babel" src="./src/pages/AdminDashboard.js"></script>
  <script type="text/babel" src="./src/pages/ReceiptsPage.js"></script>
  <script type="text/babel" src="./src/pages/TeamPage.js"></script>
  <script type="text/babel" src="./src/pages/SettingsPage.js"></script>
  <script type="text/babel" src="./src/pages/AboutPage.js"></script>

  <!-- App bootstrap -->
  <script type="text/babel" src="./src/App.js"></script>
  <script type="text/babel" src="./src/main.js"></script>

  <script>
    (function initSafeLucideRefresh() {
      var refreshQueued = false;
      var refreshLocked = false;

      function runCreateIcons() {
        if (!window.lucide || typeof window.lucide.createIcons !== "function") {
          return;
        }

        if (refreshLocked) {
          refreshQueued = true;
          return;
        }

        refreshLocked = true;
        try {
          window.lucide.createIcons();
        } catch (err) {
          if (err && err.name !== "NotFoundError") {
            console.warn("Lucide createIcons hatasi:", err);
          }
        } finally {
          refreshLocked = false;
          if (refreshQueued) {
            refreshQueued = false;
            requestAnimationFrame(runCreateIcons);
          }
        }
      }

      window.refreshIcons = function refreshIcons() {
        if (typeof requestAnimationFrame === "function") {
          requestAnimationFrame(runCreateIcons);
        } else {
          setTimeout(runCreateIcons, 0);
        }
      };

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", window.refreshIcons, { once: true });
      } else {
        window.refreshIcons();
      }
    })();
  </script>
</body>
</html>
